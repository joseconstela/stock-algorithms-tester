services:
  mongodb:
    image: mongo:7
    container_name: strategy_tester-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - strategy_tester_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: strategy_tester
    command: mongod --quiet --logpath /dev/null

  redis:
    image: redis:7
    container_name: strategy_tester-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - strategy_tester_redis_data:/data

volumes:
  strategy_tester_mongo_data:
  strategy_tester_redis_data:
